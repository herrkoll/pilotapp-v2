// ── LOGIN ──
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pw, setPw]       = useState("");
  const [err, setErr]     = useState(false);

  const handle = () => {
    if (email.trim() && pw.trim()) { onLogin(email); }
    else { setErr(true); setTimeout(() => setErr(false), 1800); }
  };

  return (
    <div style={{ width:390, height:760, background:"#fff", borderRadius:40, overflow:"hidden", display:"flex", flexDirection:"column", boxShadow:"0 30px 80px rgba(0,0,0,0.25)", fontFamily:"-apple-system,sans-serif" }}>
      <div style={{ background:BK, flex:"0 0 260px", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:8 }}>
        <div style={{ fontSize:11, fontWeight:800, letterSpacing:3, color:"rgba(255,255,255,0.35)", textTransform:"uppercase" }}>Oberösterreichische Volkspartei</div>
        <div style={{ color:Y, fontWeight:900, fontSize:36, letterSpacing:4 }}>PILOT</div>
        <div style={{ fontSize:13, color:"rgba(255,255,255,0.45)", marginTop:4 }}>Dein digitaler Wahlhelfer</div>
      </div>
      <div style={{ flex:1, padding:"32px 28px 24px", display:"flex", flexDirection:"column", gap:12 }}>
        <p style={{ fontWeight:900, fontSize:18, margin:"0 0 8px", color:BK }}>Anmelden</p>
        <input value={email} onChange={e => setEmail(e.target.value)} placeholder="E-Mail-Adresse"
          style={{ width:"100%", background:LG, border:`1.5px solid ${err && !email.trim() ? RD : LG}`, borderRadius:12, padding:"13px 14px", fontSize:15, outline:"none", boxSizing:"border-box" }} />
        <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="Passwort"
          onKeyDown={e => e.key === "Enter" && handle()}
          style={{ width:"100%", background:LG, border:`1.5px solid ${err && !pw.trim() ? RD : LG}`, borderRadius:12, padding:"13px 14px", fontSize:15, outline:"none", boxSizing:"border-box" }} />
        {err && <p style={{ color:RD, fontSize:13, margin:0 }}>Bitte E-Mail und Passwort eingeben.</p>}
        <button onClick={handle} style={{ width:"100%", background:BK, color:Y, border:"none", borderRadius:12, padding:"15px 0", fontWeight:900, fontSize:16, cursor:"pointer", marginTop:4 }}>Anmelden</button>
        <p style={{ fontSize:12, color:GR, textAlign:"center", margin:"8px 0 0" }}>Passwort vergessen? Wende dich an dein Bezirksbüro.</p>
      </div>
    </div>
  );
}

// ── TOP 3 CAROUSEL ──
function Top3Carousel({ posts, onShare }) {
  const [idx, setIdx]             = useState(0);
  const [dragStart, setDragStart] = useState(null);
  const prev = () => setIdx(x => Math.max(0, x - 1));
  const next = () => setIdx(x => Math.min(posts.length - 1, x + 1));
  const onTouchStart = e => setDragStart(e.touches[0].clientX);
  const onTouchEnd   = e => { if (dragStart === null) return; dragStart - e.changedTouches[0].clientX > 40 ? next() : dragStart - e.changedTouches[0].clientX < -40 && prev(); setDragStart(null); };
  const onMouseDown  = e => setDragStart(e.clientX);
  const onMouseUp    = e => { if (dragStart === null) return; dragStart - e.clientX > 40 ? next() : dragStart - e.clientX < -40 && prev(); setDragStart(null); };
  const p  = posts[idx];
  const bg = CARD_COLORS[idx] ?? BK;

  return (
    <div>
      <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} onMouseUp={onMouseUp}
        style={{ borderRadius:20, background:bg, overflow:"hidden", boxShadow:"0 8px 32px rgba(0,0,0,0.18)", cursor:"grab", userSelect:"none", transition:"background .35s" }}>
        <div style={{ width:"100%", height:150, background:POST_IMAGES[p.img], display:"flex", alignItems:"flex-end", padding:"12px 16px", position:"relative" }}>
          <div style={{ position:"absolute", top:12, right:14, display:"flex", gap:5 }}>
            {posts.map((_, x) => (
              <div key={x} onClick={e => { e.stopPropagation(); setIdx(x); }}
                style={{ width:x === idx ? 18 : 5, height:5, borderRadius:3, background:x === idx ? "#fff" : "rgba(255,255,255,0.3)", cursor:"pointer", transition:"all .3s" }} />
            ))}
          </div>
          <div style={{ width:28, height:28, borderRadius:"50%", background:Y, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:13, color:BK }}>{idx + 1}</div>
        </div>
        <div style={{ padding:"16px 18px 18px" }}>
          <p style={{ color:"rgba(255,255,255,0.4)", fontSize:10, fontWeight:800, letterSpacing:1.4, textTransform:"uppercase", margin:"0 0 8px" }}>Top-Post diese Woche</p>
          <h3 style={{ color:"#fff", fontSize:18, fontWeight:900, lineHeight:1.3, margin:"0 0 10px" }}>{p.title}</h3>
          <p style={{ color:"rgba(255,255,255,0.55)", fontSize:13, lineHeight:1.5, margin:"0 0 18px" }}>{p.caption}</p>
          <button onClick={() => onShare(p)} style={{ width:"100%", background:Y, color:BK, border:"none", borderRadius:12, padding:"13px 0", fontWeight:900, fontSize:15, cursor:"pointer" }}>Jetzt teilen →</button>
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:12 }}>
        <button onClick={prev} disabled={idx === 0} style={{ width:38, height:38, borderRadius:"50%", border:"none", background:idx === 0 ? LG : BK, color:idx === 0 ? GR : "#fff", fontWeight:900, fontSize:20, cursor:idx === 0 ? "default" : "pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
        <span style={{ color:GR, fontSize:12 }}>← wischen →</span>

      </div>
    </div>
  );
}

          <button key={t} onClick={() => setActiveTag(t)} style={{ flexShrink:0, padding:"6px 14px", borderRadius:20, border:"none", background:activeTag === t ? BK : LG, color:activeTag === t ? Y : GR, fontWeight:700, fontSize:13, cursor:"pointer" }}>{t}</button>

// ── ARGUMENTE ──
function ArgumentsScreen() {
  const [activeTag, setActiveTag] = useState("Alle");
  const [open, setOpen]           = useState(null);
  const [favs, setFavs]           = useState([]);
  const [searching, setSearching] = useState(false);
  const [query, setQuery]         = useState("");
  const tagList  = ["Alle","Wirtschaft","Zukunft","Familie","Infrastruktur","Allgemein"];
  const filtered = args.filter(a => {
    const tagOk = activeTag === "Alle" || a.tag === activeTag;
    const qOk   = !query || a.q.toLowerCase().includes(query.toLowerCase()) || a.a.toLowerCase().includes(query.toLowerCase());
    return tagOk && qOk;
  });
  return (
    <div style={{ padding:16 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
        <h2 style={{ fontSize:22, fontWeight:900, margin:0 }}>Argumente</h2>
        <button onClick={() => { setSearching(s => !s); setQuery(""); }}
          style={{ background:searching ? BK : LG, border:"none", cursor:"pointer", width:36, height:36, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17 }}>🔍</button>
      </div>
      {searching && <input autoFocus value={query} onChange={e => setQuery(e.target.value)} placeholder="Suche…"
        style={{ width:"100%", background:LG, border:"none", borderRadius:12, padding:"11px 14px", fontSize:15, outline:"none", boxSizing:"border-box", marginBottom:12, fontFamily:"inherit" }} />}
      {!searching && <p style={{ color:GR, fontSize:13, marginBottom:12 }}>Was sage ich, wenn jemand fragt…</p>}
      <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:10, marginBottom:14 }}>
        {tagList.map(t => (
          <button key={t} onClick={() => setActiveTag(t)} style={{ flexShrink:0, padding:"6px 14px", borderRadius:20, border:"none", background:activeTag === t ? BK : LG, color:activeTag === t ? Y : GR, fontWeight:700, fontSize:13, cursor:"pointer" }}>{t}</button>
        ))}
      </div>
      {filtered.length === 0 && <p style={{ color:GR, fontSize:14, textAlign:"center", marginTop:24 }}>Keine Ergebnisse.</p>}
      {filtered.map(a => (
        <div key={a.id} style={{ border:`1px solid ${LG}`, borderRadius:14, marginBottom:10, overflow:"hidden" }}>
          <div onClick={() => setOpen(open === a.id ? null : a.id)} style={{ background:"#fff", padding:"14px 16px", display:"flex", alignItems:"center", cursor:"pointer", gap:10 }}>
            <span style={{ fontWeight:700, fontSize:14, lineHeight:1.4, flex:1 }}>{a.q}</span>
            <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
              <button onClick={e => { e.stopPropagation(); setFavs(f => f.includes(a.id) ? f.filter(x => x !== a.id) : [...f, a.id]); }}
                style={{ background:favs.includes(a.id) ? Y : LG, border:"none", borderRadius:6, width:28, height:28, cursor:"pointer", fontWeight:900, fontSize:15 }}>★</button>
              <span style={{ color:GR, fontSize:12 }}>{open === a.id ? "▲" : "▼"}</span>
            </div>
          </div>
          {open === a.id && <div style={{ background:"#FAFAFA", borderTop:`1px solid ${LG}`, padding:"14px 16px", fontSize:14, lineHeight:1.6 }}>{a.a}</div>}
        </div>
      ))}
    </div>
  );
}

// ── HAUSTÜR ──
function DoorScreen() {
  const [entries, setEntries] = useState([
    {id:1, addr:"Hauptstraße 12", r:"👍", col:"#22C55E", time:"14:32"},
    {id:2, addr:"Hauptstraße 14", r:"🚪", col:"#8A8A8A", time:"14:38"},
    {id:3, addr:"Hauptstraße 16", r:"😐", col:"#F59E0B", time:"14:45"},
  ]);
  const [input, setInput] = useState("");
  const [done, setDone]   = useState(false);
  const counts = REACTION_DEF.reduce((acc,[r]) => ({ ...acc, [r]: entries.filter(e => e.r === r).length }), {});

  const addEntry = (r, col) => {
    if (!input.trim()) return;
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2,"0");
    const mm  = String(now.getMinutes()).padStart(2,"0");
    setEntries(e => [...e, { id:Date.now(), addr:input.trim(), r, col, time:`${hh}:${mm}` }]);
    setInput("");
  };

  if (done) return (
    <div style={{ padding:"28px 16px", textAlign:"center" }}>
      <div style={{ width:60, height:60, borderRadius:"50%", background:Y, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:26, margin:"0 auto 14px" }}>!</div>
      <h2 style={{ fontSize:22, fontWeight:900, marginBottom:4 }}>Tour beendet!</h2>
      <p style={{ color:GR, fontSize:14, marginBottom:20 }}>Danke für deinen Einsatz heute.</p>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
        {REACTION_DEF.map(([r,l]) => (
          <div key={r} style={{ background:LG, borderRadius:12, padding:14 }}>
            <div style={{ fontSize:26, marginBottom:4 }}>{r}</div>
            <div style={{ fontWeight:900, fontSize:20 }}>{counts[r]}</div>
            <div style={{ fontSize:12, color:GR }}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{ background:Y, borderRadius:12, padding:14, marginBottom:16 }}>
        <strong style={{ fontSize:16 }}>{entries.length} Türen · {counts["👍"]} positiv</strong>
      </div>
      <button onClick={() => { setDone(false); setEntries([]); }} style={{ background:BK, color:"#fff", border:"none", borderRadius:12, padding:"14px 32px", fontWeight:800, fontSize:15, cursor:"pointer" }}>Neue Tour starten</button>
    </div>
  );

  const rev = [...entries].reverse();
  return (
    <div style={{ padding:16 }}>
      <p style={{ color:GR, fontSize:13, marginBottom:2 }}>Donnerstag, 14. Mai 2026</p>
      <h2 style={{ fontSize:22, fontWeight:900, marginBottom:16, marginTop:0 }}>Haustür-Tour</h2>
      <div style={{ background:LG, borderRadius:12, padding:"10px 14px", marginBottom:10, display:"flex", gap:10, alignItems:"center" }}>
        <span>📍</span>
        <input value={input} onChange={e => setInput(e.target.value)} placeholder="Adresse / Haustür eingeben…"
          style={{ flex:1, background:"transparent", border:"none", outline:"none", fontSize:15, fontWeight:600, fontFamily:"inherit" }} />
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
        {REACTION_DEF.map(([r,l,c]) => (
          <button key={r} onClick={() => addEntry(r, c)} style={{ border:`2px solid ${LG}`, borderRadius:12, padding:"11px 8px", background:"#fff", fontWeight:700, fontSize:13, cursor:"pointer", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:20 }}>{r}</span>{l}
          </button>
        ))}
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        {REACTION_DEF.map(([r,,c]) => (
          <div key={r} style={{ flex:1, background:LG, borderRadius:10, padding:"8px 4px", textAlign:"center" }}>
            <div style={{ fontSize:15 }}>{r}</div>
            <div style={{ fontWeight:900, fontSize:17, color:counts[r] > 0 ? c : GR }}>{counts[r]}</div>
          </div>
        ))}
      </div>
      <button onClick={() => setDone(true)} style={{ width:"100%", background:RD, color:"#fff", border:"none", borderRadius:12, padding:"13px 0", fontWeight:800, fontSize:15, cursor:"pointer", marginBottom:20 }}>Tour beenden →</button>
      <p style={{ fontSize:11, fontWeight:800, color:GR, letterSpacing:1.2, textTransform:"uppercase", marginBottom:10 }}>Verlauf von heute</p>
      <div style={{ marginBottom:20 }}>
        {rev.map((e, i) => (
          <div key={e.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0", borderBottom:`1px solid ${LG}` }}>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:20, flexShrink:0 }}>
              <div style={{ width:10, height:10, borderRadius:"50%", background:e.col }} />
              {i < rev.length - 1 && <div style={{ width:2, height:22, background:LG, marginTop:2 }} />}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:700, fontSize:14 }}>{e.addr}</div>
              <div style={{ fontSize:12, color:GR, marginTop:2 }}>{e.time} Uhr</div>
            </div>
            <span style={{ fontSize:20 }}>{e.r}</span>
          </div>
        ))}
      </div>
      <p style={{ fontSize:11, fontWeight:800, color:GR, letterSpacing:1.2, textTransform:"uppercase", marginBottom:10 }}>Meine letzten Touren</p>
      {PAST_TOURS.map((t, i) => (
        <div key={i} style={{ background:LG, borderRadius:12, padding:"12px 14px", marginBottom:8, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontWeight:800, fontSize:14 }}>{t.date}</div>
            <div style={{ fontSize:12, color:GR, marginTop:2 }}>{t.note}</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontWeight:900, fontSize:16 }}>{t.doors} Türen</div>
            <div style={{ fontSize:12, color:"#22C55E", fontWeight:700 }}>{t.pos} positiv</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── APP ──
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [user, setUser]         = useState("");
  const [tab, setTab]           = useState(0);
  const [menuOpen, setMenuOpen] = useState(false);

  const navItems = [
    { icon:"🏠", label:"Heute" },
    { icon:"📤", label:"Teilen" },
    { icon:"💬", label:"Argumente" },
    { icon:"🚪", label:"Haustür" },
  ];
  const screens = [
    <HomeScreen setTab={setTab} />,
    <ContentScreen />,
    <ArgumentsScreen />,
    <DoorScreen />,
  ];

  if (!loggedIn) return (
    <div style={{ display:"flex", justifyContent:"center", alignItems:"center", minHeight:"100vh", background:"#e0e0e0", fontFamily:"-apple-system,sans-serif" }}>
      <LoginScreen onLogin={u => { setUser(u); setLoggedIn(true); }} />
    </div>
  );

  return (
    <div style={{ display:"flex", justifyContent:"center", alignItems:"center", minHeight:"100vh", background:"#e0e0e0", fontFamily:"-apple-system,sans-serif" }}>
      <div style={{ width:390, height:760, background:"#fff", borderRadius:40, overflow:"hidden", position:"relative", boxShadow:"0 30px 80px rgba(0,0,0,0.25)", display:"flex", flexDirection:"column" }}>
        {menuOpen && <MenuDrawer user={user} onClose={() => setMenuOpen(false)} onLogout={() => { setLoggedIn(false); setMenuOpen(false); setUser(""); }} />}
        <div style={{ background:BK, padding:"14px 20px 10px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
          <span style={{ color:"#fff", fontSize:13, fontWeight:700 }}>9:41</span>
          <span style={{ color:Y, fontWeight:900, fontSize:18, letterSpacing:2 }}>PILOT</span>
          <button onClick={() => setMenuOpen(true)} style={{ width:32, height:32, borderRadius:"50%", background:Y, border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:14, color:BK }}>
            {user.charAt(0).toUpperCase()}
          </button>
        </div>
        <div style={{ flex:1, overflowY:"auto", position:"relative" }}>
          {screens[tab]}
        </div>
        <div style={{ display:"flex", borderTop:`1px solid ${LG}`, flexShrink:0, background:"#fff" }}>
          {navItems.map((item, i) => (
            <button key={i} onClick={() => setTab(i)} style={{ flex:1, background:"none", border:"none", padding:"8px 0 10px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
              <div style={{ width:36, height:36, borderRadius:10, background:tab === i ? Y : "transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>{item.icon}</div>
              <span style={{ fontSize:10, fontWeight:tab === i ? 800 : 500, color:tab === i ? BK : GR }}>{item.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
